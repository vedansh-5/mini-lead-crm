version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Connect to the postgres container using its service name 'db'
      - DATABASE_URL=host=db user=postgres password=postgres dbname=crm port=5432 sslmode=disable
      # Connect to the redis container
      - REDIS_URL=redis:6379
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
